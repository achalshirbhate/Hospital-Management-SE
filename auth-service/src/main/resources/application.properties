# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=auth-service

# Port: Render/Railway inject $PORT automatically.
# Fallback to 8081 for local development.
server.port=${PORT:8081}

# ─── Database (Supabase) ──────────────────────────────────────────────────────
# All values come from environment variables.
# Local dev: set them in your shell or a .env file (never commit real values).
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.dkksbddtojuhhbdkyvad}
spring.datasource.password=${DB_PASSWORD:Ach@l789Achal}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — keep pool small for Supabase free tier (max 15 connections)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Required for Supabase session pooler (PgBouncer in session mode)
spring.datasource.hikari.connection-init-sql=SELECT 1

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "update" is safe for initial deploy; switch to "validate" once schema is stable
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
# Disable open-session-in-view to avoid connection pool exhaustion
spring.jpa.open-in-view=false

# ─── Email (Gmail SMTP) ───────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:aachalshirbhate4@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jmjwhcgnzadujvph}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Generate a strong secret: openssl rand -base64 64
# Default value is for local dev only — override with JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:TelePatient$SuperSecret$Key$LocalDev$Only$NotForProd}
# 24 hours in milliseconds
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins.
# Example: https://myapp.com,https://myapp.netlify.app
# For mobile apps (Flutter), use * or leave blank — mobile apps don't send Origin.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ─── Actuator (health check endpoint for Render/Railway) ─────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.telepatient=INFO
logging.level.org.springframework.security=WARN
