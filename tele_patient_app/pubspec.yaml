name: tele_patient_app
description: Tele Patient Handling System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # HTTP
  http: ^1.2.0
  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0
  # Navigation
  go_router: ^13.2.0
  # PDF viewer
  flutter_pdfview: ^1.3.2
  # File picker
  file_picker: ^8.0.3
  # Image picker
  image_picker: ^1.0.7
  # Shared preferences (caching)
  shared_preferences: ^2.2.2
  # Icons
  cupertino_icons: ^1.0.6
  # Date formatting
  intl: ^0.19.0
  # URL launcher
  url_launcher: ^6.2.5
  # Cached network image
  cached_network_image: ^3.3.1
  # Connectivity
  connectivity_plus: ^6.0.3
  # WebRTC for video calls
  flutter_webrtc: ^0.11.7
  # WebSocket
  web_socket_channel: ^2.4.0
  # Local notifications
  flutter_local_notifications: ^17.0.0
  # Permission handler
  permission_handler: ^11.3.0
  # PDF generation
  pdf: ^3.10.7
  printing: ^5.12.0
  # Path provider for file storage
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
