name: telepatient_app
description: Tele-Patient Handling System - Flutter Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2   # Encrypted token storage (Keychain/Keystore)

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.0
  badges: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  timeago: ^3.6.1
  fl_chart: ^0.66.2
  lottie: ^3.1.0

  # File & URL
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  open_filex: ^4.3.4

  # WebRTC (signaling only via WebSocket, actual WebRTC via flutter_webrtc)
  flutter_webrtc: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
